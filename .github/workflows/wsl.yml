# This file is automatically generated from Nix configuration. Do not edit directly.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          name: janusz-bit
      - name: wsl
        run: nix build .#nixosConfigurations.wsl.config.system.build.toplevel --show-trace --accept-flake-config
name: wsl
"on":
  pull_request:
    branches:
      - master
  push:
    tags:
      - v*
  workflow_dispatch: {}
run-name: Build wsl by @${{ github.actor }}
