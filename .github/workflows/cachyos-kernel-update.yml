# This file is automatically generated from Nix configuration. Do not edit directly.

jobs:
  update-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            extra-substituters = https://janusz-bit.cachix.org
            extra-trusted-public-keys = janusz-bit.cachix.org-1:4stTiufAF02BAXw8HNvYslAmUlPbZPIRhIGht0gSMoo=
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          name: janusz-bit
      - name: Update nix-cachyos-kernel flake input
        run: nix flake lock --update-input nix-cachyos-kernel
      - name: Build Kernel
        run: nix build ".#nixosConfigurations.nixos.config.boot.kernelPackages.kernel^*" --show-trace --accept-flake-config
      - name: Commit updated flake.lock
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git diff --cached --quiet || git commit -m "flake.lock: update nix-cachyos-kernel"
          git push
name: cachyos-kernel-update
"on":
  schedule:
    - cron: 0 0 * * 0
  workflow_dispatch: {}
permissions:
  contents: write
run-name: Update & Build CachyOS Kernel by @${{ github.actor }}
